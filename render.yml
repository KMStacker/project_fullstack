databases:
  - name: mycv-db
    plan: free

services:
  - type: web
    name: mycv-app
    runtime: node
    plan: free
    buildCommand: npm run build
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mycv-db
          property: connectionString
      - key: ADMIN_PSW
        sync: false
      - key: SECRET
        sync: false